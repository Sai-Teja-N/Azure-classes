apiVersion: v1
kind: Namespace
metadata:
  name: rca
---
apiVersion: v1
kind: Secret
metadata:
  name: rca-secrets
  namespace: rca
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID:     "REPLACE"
  AWS_SECRET_ACCESS_KEY: "REPLACE"
  SUMO_ACCESS_ID:    "REPLACE"
  SUMO_ACCESS_KEY:   "REPLACE"
  SLACK_BOT_TOKEN:   "REPLACE"
  PD_WEBHOOK_SECRET: "REPLACE"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: rca
spec:
  replicas: 1
  selector: {matchLabels: {app: redis}}
  template:
    metadata: {labels: {app: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server","--appendonly","yes"]
          ports: [{containerPort: 6379}]
---
apiVersion: v1
kind: Service
metadata: {name: redis, namespace: rca}
spec:
  selector: {app: redis}
  ports: [{port: 6379, targetPort: 6379}]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rca-app
  namespace: rca
spec:
  replicas: 2
  selector: {matchLabels: {app: rca-app}}
  template:
    metadata: {labels: {app: rca-app}}
    spec:
      containers:
        - name: rca-app
          image: ghcr.io/yourorg/rca-langgraph:latest
          ports: [{containerPort: 8080}]
          env:
            - {name: REDIS_URL, value: "redis://redis:6379/0"}
            - {name: SLACK_CHANNEL, value: "#incidents"}
            - {name: LLM_MODEL, value: "amazon.nova-micro-v1:0"}
            - {name: LLM_PROVIDER, value: "bedrock"}
          envFrom:
            - secretRef: {name: rca-secrets}
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 15
---
apiVersion: v1
kind: Service
metadata: {name: rca-app, namespace: rca}
spec:
  selector: {app: rca-app}
  ports: [{port: 80, targetPort: 8080}]
  type: ClusterIP
