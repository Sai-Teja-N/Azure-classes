<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="640" fill="#fafafa"/>
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    RCA LangGraph — Container Architecture
  </text>

  <!-- External systems -->
  <g>
    <rect x="40" y="100" width="160" height="70" rx="10" fill="#fde68a" stroke="#ca8a04"/>
    <text x="120" y="135" text-anchor="middle" font-weight="700" fill="#78350f">PagerDuty</text>
    <text x="120" y="155" text-anchor="middle" font-size="12" fill="#78350f">incident webhook</text>

    <rect x="40" y="320" width="160" height="70" rx="10" fill="#bae6fd" stroke="#0369a1"/>
    <text x="120" y="355" text-anchor="middle" font-weight="700" fill="#0c4a6e">SumoLogic</text>
    <text x="120" y="375" text-anchor="middle" font-size="12" fill="#0c4a6e">search API (by source)</text>

    <rect x="900" y="320" width="160" height="70" rx="10" fill="#d9f99d" stroke="#4d7c0f"/>
    <text x="980" y="355" text-anchor="middle" font-weight="700" fill="#365314">Slack</text>
    <text x="980" y="375" text-anchor="middle" font-size="12" fill="#365314">#incidents channel</text>

    <rect x="900" y="100" width="160" height="70" rx="10" fill="#fbcfe8" stroke="#be185d"/>
    <text x="980" y="135" text-anchor="middle" font-weight="700" fill="#831843">Anthropic API</text>
    <text x="980" y="155" text-anchor="middle" font-size="12" fill="#831843">Claude (LLM)</text>
  </g>

  <!-- Container boundary -->
  <rect x="240" y="80" width="640" height="460" rx="14"
        fill="none" stroke="#64748b" stroke-dasharray="6 4"/>
  <text x="260" y="104" font-size="13" fill="#475569" font-weight="600">Docker container: rca-app</text>

  <!-- FastAPI -->
  <rect x="270" y="120" width="180" height="60" rx="10" fill="url(#node)" stroke="#334155"/>
  <text x="360" y="145" text-anchor="middle" font-weight="700" fill="#0f172a">FastAPI</text>
  <text x="360" y="165" text-anchor="middle" font-size="12" fill="#334155">/webhooks/pagerduty</text>

  <!-- Graph box -->
  <rect x="270" y="210" width="580" height="220" rx="10" fill="#ffffff" stroke="#334155"/>
  <text x="290" y="232" font-weight="700" fill="#0f172a">LangGraph StateGraph</text>
  <text x="290" y="250" font-size="12" fill="#475569">State: RCAState (TypedDict) • Checkpointer: RedisSaver</text>

  <!-- 4 nodes -->
  <g font-size="12" fill="#0f172a">
    <rect x="290" y="270" width="130" height="60" rx="10" fill="url(#node)" stroke="#1d4ed8"/>
    <text x="355" y="292" text-anchor="middle" font-weight="700">1. pd_collector</text>
    <text x="355" y="310" text-anchor="middle" font-size="11" fill="#475569">parse + map source</text>

    <rect x="432" y="270" width="130" height="60" rx="10" fill="url(#node)" stroke="#1d4ed8"/>
    <text x="497" y="292" text-anchor="middle" font-weight="700">2. sumo_fetcher</text>
    <text x="497" y="310" text-anchor="middle" font-size="11" fill="#475569">query logs</text>

    <rect x="574" y="270" width="130" height="60" rx="10" fill="url(#node)" stroke="#1d4ed8"/>
    <text x="639" y="292" text-anchor="middle" font-weight="700">3. llm_analyzer</text>
    <text x="639" y="310" text-anchor="middle" font-size="11" fill="#475569">RCA summary</text>

    <rect x="716" y="270" width="130" height="60" rx="10" fill="url(#node)" stroke="#1d4ed8"/>
    <text x="781" y="292" text-anchor="middle" font-weight="700">4. slack_notifier</text>
    <text x="781" y="310" text-anchor="middle" font-size="11" fill="#475569">post message</text>
  </g>

  <!-- Node arrows -->
  <line x1="420" y1="300" x2="430" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="562" y1="300" x2="572" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="704" y1="300" x2="714" y2="300" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- FastAPI -> graph -->
  <line x1="360" y1="180" x2="360" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- External arrows -->
  <line x1="200" y1="135" x2="268" y2="148" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="420" y1="355" x2="200" y2="355" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="332" x2="900" y2="140" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="846" y1="300" x2="900" y2="345" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <!-- sumo arrow back down from node 2 -->
  <line x1="497" y1="332" x2="200" y2="355" stroke="#475569" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Redis -->
  <rect x="430" y="460" width="260" height="60" rx="10" fill="#fee2e2" stroke="#b91c1c"/>
  <text x="560" y="484" text-anchor="middle" font-weight="700" fill="#7f1d1d">Redis (container)</text>
  <text x="560" y="504" text-anchor="middle" font-size="12" fill="#7f1d1d">
    checkpointer + cache (dedup, sumo, LLM)
  </text>

  <line x1="560" y1="430" x2="560" y2="458" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="458" x2="560" y2="430" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Legend -->
  <g font-size="12" fill="#334155">
    <rect x="260" y="560" width="14" height="14" fill="#fde68a" stroke="#ca8a04"/>
    <text x="282" y="572">external trigger</text>
    <rect x="400" y="560" width="14" height="14" fill="url(#node)" stroke="#1d4ed8"/>
    <text x="422" y="572">graph node</text>
    <rect x="530" y="560" width="14" height="14" fill="#fee2e2" stroke="#b91c1c"/>
    <text x="552" y="572">state/cache store</text>
    <line x1="700" y1="568" x2="740" y2="568" stroke="#475569" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="748" y="572">cached call</text>
  </g>
</svg>
