version: "3.9"

services:
  rca-app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: rca-langgraph:latest
    container_name: rca-app
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    volumes:
      - ../logs:/srv/logs           # logs persisted on host
      - ~/.aws:/root/.aws:ro        # share host AWS profiles with container
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: rca-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
